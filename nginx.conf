server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web is a SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the Flutter bootstrap files so updates deploy cleanly
    location ~* \.(json|html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long-lived cache for hashed assets
    location ~* \.(js|wasm|css|png|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
