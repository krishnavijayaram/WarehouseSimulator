<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WIOS — Warehouse Intelligence &amp; Operations System">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WIOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WIOS — Warehouse Intelligence &amp; Operations System</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Suppress native browser context menu so the app's own right-click menus work. -->
  <script>
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  </script>

  <!--
    Fire-and-forget beacon flush: called by Flutter via dart:js whenever a
    discovery batch is ready.  navigator.sendBeacon is queued by the browser,
    survives page close / refresh, and never blocks the main thread.
  -->
  <script>
    // Called by RobotScoutSimulation._postToBackend() on web.
    window.woisSendBeacon = function(url, payload) {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(url, new Blob([payload], { type: 'application/json' }));
      }
    };
  </script>
  <!--
    CACHE FIX. Flutter's default service worker kept serving a STALE build after a
    deploy: the new index.html loaded (so the UI/mode changed) but the old app JS
    stayed cached, so the running simulator used old logic and robots never moved
    even though the shipped code was correct. This app needs no offline caching,
    so we auto-reload when a new service worker takes control, and clear any
    existing registration, guaranteeing the latest build is used after a deploy.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      // Reload once a newly-installed worker takes over, so a fresh deploy is
      // picked up automatically instead of staying stale until a hard refresh.
      var _reloadedForSW = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (_reloadedForSW) return;
        _reloadedForSW = true;
        window.location.reload();
      });
      // This app needs NO offline caching, and a stale service worker was the
      // root cause of a deploy serving old JS (new index.html, old app code) so
      // the running simulator used old logic and robots never moved. FULLY
      // unregister every worker and purge all caches, then reload once if a
      // worker had been controlling this page — guaranteeing the freshest build
      // is served after every deploy.
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var hadController = !!navigator.serviceWorker.controller;
        var jobs = regs.map(function (r) { return r.unregister(); });
        if (window.caches && caches.keys) {
          jobs.push(caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }));
        }
        Promise.all(jobs).then(function () {
          if (hadController && !_reloadedForSW) {
            _reloadedForSW = true;
            window.location.reload();
          }
        }).catch(function () {});
      }).catch(function () {});
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
